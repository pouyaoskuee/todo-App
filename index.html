<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <title>todolist</title>
</head>
<body>



<section class="main">
    <header>
        <h1>Todolist</h1>
    </header>
    <form class="add__form">
        <label class="visually-hidden" for="task">Task</label>
        <input id="task" type="text" class="input" placeholder="What needs to be done?">
        <button type="submit">Add</button>

        <label class="visually-hidden" for="sort">Status</label>
        <select id="sort" class="filter-todos" name="todos">
            <option value="all">all</option>
            <option value="completed">completed</option>
            <option value="uncompleted">uncompleted</option>
        </select>
    </form>


        <div class="list__form">
            <ul class="list__ul">

            </ul>
        </div>

</section>



<section class="modal">
    <div class="modal__container">
        <form>
            <div class="modal__header">
                <label class="" for="edite"> edit your note</label>
                <span class="remove modal__close">&times;</span>
            </div>
            <input class="edit__input" id="edite" type="text" placeholder="type your new note ">
        </form>
    </div>
</section>

<div class="blur"></div>




<script src="script.js"></script>
</body>
</html>
